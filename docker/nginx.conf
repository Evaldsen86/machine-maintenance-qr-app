#
# Nginx config (skeleton)
# -----------------------
# This file is a placeholder for the future HTTPS + reverse-proxy setup.
#
# It currently:
# - serves the built React SPA from /usr/share/nginx/html
# - proxies /api/* to the Express backend container
#
# TLS termination (HTTPS) is intentionally NOT enabled in this skeleton yet,
# because valid certs are not present in the repository.
#

server {
  listen 80;
  server_name _;

  # Reasonable default for uploads (tune later)
  client_max_body_size 50m;

  # React SPA static hosting
  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to backend
  location /api/ {
    proxy_pass http://backend:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback for non-file routes
  location / {
    try_files $uri $uri/ /index.html;
  }
}

